                      tracking, nor the vacuum state has changed
                    condition: template
                    value_template: >-
                      {{ is_state('select.roborock_saros_10r_selected_map',
                      floor) and (kitchen == 'ignore' or 
                      is_state('binary_sensor.zbeacon_ds01_drzwi_kuchnia_przyziemie',
                      kitchen)) and
                      is_state('script.saros_10r_position_tracking', tracking)
                      and is_state('vacuum.matter_saros_10r', vacuum) }}
                  - condition: numeric_state
                    entity_id: input_number.saros_10r_current_position_y
                    above: 27500
                  - condition: numeric_state
                    entity_id: input_number.saros_10r_current_position_x
                    below: 31800
                    above: 31300
                sequence:
                  - action: vacuum.pause
                    metadata: {}
                    target:
                      entity_id: vacuum.matter_saros_10r
                    data: {}
                  - alias: wait for the vacuum to enter paused state
                    repeat:
                      until:
                        - condition: state
                          entity_id: vacuum.matter_saros_10r
                          state:
