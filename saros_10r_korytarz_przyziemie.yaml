                          value_template: "{{ lock == 'ignore' }}"
                        - condition: state
                          entity_id: binary_sensor.zbeacon_ds01_drzwi_sluza_przyziemie
                          state:
                            - "on"
                        - condition: numeric_state
                          entity_id: input_number.saros_10r_current_position_y
                          below: 27500
                        - condition: numeric_state
                          entity_id: input_number.saros_10r_current_position_x
                          below: 31300
          sequence:
            - wait_for_trigger:
                - trigger: state
                  entity_id:
                    - binary_sensor.zbeacon_ds01_drzwi_kuchnia_przyziemie
                    - binary_sensor.zbeacon_ds01_drzwi_sluza_przyziemie
                    - binary_sensor.zbeacon_ds01_drzwi_lazienka_przyziemie
                    - select.roborock_saros_10r_selected_map
                    - script.saros_10r_position_tracking
                    - sensor.roborock_saros_10r_current_room
                    - vacuum.matter_saros_10r
                    - sensor.matter_saros_10r_operational_state
                    - vacuum.roborock_saros_10r
                    - sensor.roborock_saros_10r_status
                    - binary_sensor.roborock_saros_10r_cleaning
                    - sensor.saros_10r_current_position
      - action: script.turn_on
        metadata: {}
        data:
          variables:
            kitchen: "{{ kitchen }}"
            lock: "{{ lock }}"
            washroom: "{{ washroom }}"
        target:
          entity_id: script.saros_10r_korytarz_przyziemie
alias: Saros 10R korytarz przyziemie
description: ""
mode: restart
