                      door sensor, or to ignore the door state
                    repeat:
                      until:
                        - condition: or
                          conditions:
                            - condition: state
                              entity_id: >-
                                binary_sensor.zbeacon_ds01_drzwi_sluza_przyziemie
                              state:
                                - "on"
                            - condition: state
