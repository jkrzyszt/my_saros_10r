sequence:
  - variables:
      floor: "{{ states('select.roborock_saros_10r_selected_map') }}"
      kitchen: |-
        {% if kitchen is defined and kithen == 'ignore' %}
          {{ kitchen }}
        {% else %}
          {{ states('binary_sensor.zbeacon_ds01_drzwi_kuchnia_przyziemie') }}
        {% endif %}
      lock: |-
        {% if lock is defined and lock == 'ignore' %}
          {{ lock }}
        {% else %}
          {{ states('binary_sensor.zbeacon_ds01_drzwi_sluza_przyziemie') }}
        {% endif %}
      paused: "{{ paused | default(false) }}"
      timestamp: "{{ timestamp | int(now() | as_timestamp) }}"
      tracking: "{{ states('script.saros_10r_position_tracking') }}"
      vacuum: "{{ states('vacuum.matter_saros_10r') }}"
      washroom: |-
        {% if washroom is defined and washroom == 'ignore' %}
          {{ washroom }}
        {% else %}
          {{ states('binary_sensor.zbeacon_ds01_drzwi_lazienka_przyziemie') }}
        {% endif %}
      x: "{{ states('input_number.saros_10r_current_position_x') | int }}"
      "y": "{{ states('input_number.saros_10r_current_position_y') | int }}"
  - choose:
      - conditions:
          - alias: the vacuum is docked or not manageable
            condition: template
            value_template: "{{ vacuum in [ 'docked', 'error', 'unknown', 'unavailable', ] }}"
        sequence: []
      - conditions:
          - alias: the vacuum is not moving or position tracking is not active
            condition: template
            value_template: >-
              {{ not paused and (vacuum in [ 'paused', 'idle', ] or tracking !=
              'on') }}
        sequence:
          - alias: wait for the vacuum moving again and position tracking recovered
            wait_for_trigger:
              - trigger: state
                entity_id:
                  - select.roborock_saros_10r_selected_map
              - trigger: state
                entity_id:
                  - script.saros_10r_position_tracking
              - trigger: state
                entity_id:
                  - sensor.roborock_saros_10r_status
              - trigger: state
                entity_id:
                  - sensor.roborock_saros_10r_current_room
              - trigger: state
                entity_id:
                  - vacuum.matter_saros_10r
              - trigger: state
                entity_id:
                  - sensor.matter_saros_10r_operational_state
              - trigger: state
                entity_id:
                  - vacuum.roborock_saros_10r
              - trigger: state
                entity_id:
                  - binary_sensor.roborock_saros_10r_cleaning
              - trigger: state
                entity_id:
                  - sensor.saros_10r_current_position
          - action: script.turn_on
            metadata: {}
            data:
              variables:
                kitchen: "{{ kitchen }}"
                lock: "{{ lock }}"
                washroom: "{{ washroom }}"
            target:
              entity_id: script.saros_10r_korytarz_przyziemie
      - conditions:
          - condition: template
            value_template: "{{ floor != 'Przyziemie' }}"
            alias: the vacuum is cleaning a floor other than przyziemie
        sequence: []
      - conditions:
          - alias: the vacuum is outside
            condition: template
            value_template: >-
              {{ x < 28700 or x > 31800 or y > 29000 or (x > 30300 and y <
              27500) }}
        sequence:
          - choose:
              - conditions:
                  - alias: the vacuum has eneterd kuchnia
                    condition: template
                    value_template: "{{ x < 28700 and y > 27000 and y < 29000 }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: state
                            entity_id: >-
                              binary_sensor.zbeacon_ds01_drzwi_kuchnia_przyziemie
                            state:
                              - "on"
                        sequence:
                          - action: script.turn_on
                            metadata: {}
                            data: {}
                            target:
                              entity_id:
                                - script.saros_10r_kuchnia_przyziemie
                    default:
                      - action: script.turn_on
                        metadata: {}
                        data:
                          variables:
                            door: ignore
                        target:
                          entity_id:
                            - script.saros_10r_kuchnia_przyziemie
              - conditions:
                  - alias: the vacuum has eneterd śluza
                    condition: template
                    value_template: "{{ x > 31800 and y > 27500 }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: state
                            entity_id: binary_sensor.zbeacon_ds01_drzwi_sluza_przyziemie
                            state:
                              - "on"
                        sequence:
                          - action: script.turn_on
                            metadata: {}
                            data: {}
                            target:
                              entity_id:
                                - script.saros_10r_sluza
                    default:
                      - action: script.turn_on
                        metadata: {}
                        data:
                          variables:
                            basement: ignore
                        target:
                          entity_id:
                            - script.saros_10r_sluza
              - conditions:
                  - alias: the vacuum has eneterd łazienka
                    condition: template
                    value_template: "{{ x > 30300 and y < 26500 }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: state
                            entity_id: >-
                              binary_sensor.zbeacon_ds01_drzwi_lazienka_przyziemie
                            state:
                              - "on"
                        sequence:
                          - action: script.turn_on
                            metadata: {}
                            data: {}
                            target:
                              entity_id:
                                - script.saros_10r_lazienka_przyziemie
                    default:
                      - action: script.turn_on
                        metadata: {}
                        data:
                          variables:
                            door: ignore
                        target:
                          entity_id:
                            - script.saros_10r_lazienka_przyziemie
            default:
              - action: script.turn_on
                metadata: {}
                data: {}
                target:
                  entity_id: script.saros_10r_garderoba_przyziemie
      - conditions:
          - alias: >-
              the vacuum is cleaning and may be trying to cross the door to
              kuchnia that is not open
            condition: template
            value_template: >-
              {{ (paused or vacuum == cleaning) and (y > 27500 and x > 28700 and
              x < 29200 and not kitchen in [ 'on', 'ignore', ]) }}
        sequence:
          - alias: >-
              Unless something changes its state, wait up to 30s before pausing
              the vacuum
            repeat:
              until:
                - condition: or
                  conditions:
                    - alias: >-
                        either the door to kitchen, or current floor, or
                        position tracking, or the vacuum state has changed
                      condition: template
                      value_template: >-
                        {{ not
                        is_state('select.roborock_saros_10r_selected_map',
                        floor) or not
                        is_state('binary_sensor.zbeacon_ds01_drzwi_kuchnia_przyziemie',
                        kitchen) or not
                        is_state('script.saros_10r_position_tracking', tracking)
                        or not is_state('vacuum.matter_saros_10r', vacuum) }}
                    - condition: numeric_state
                      entity_id: input_number.saros_10r_current_position_y
                      below: 27500
                    - condition: not
                      conditions:
                        - condition: numeric_state
                          entity_id: input_number.saros_10r_current_position_x
                          below: 29200
                          above: 28700
                      alias: the vacuum has left the door to kuchnia recess area
                    - alias: at least 30s has elapsed
                      condition: template
                      value_template: "{{ 30 + timestamp <= now() | as_timestamp }}"
              sequence:
                - variables:
                    seconds: "{{ 30 + timestamp - now() | as_timestamp }}"
                - wait_for_trigger:
                    - trigger: state
                      entity_id:
                        - binary_sensor.zbeacon_ds01_drzwi_kuchnia_przyziemie
                        - select.roborock_saros_10r_selected_map
                        - script.saros_10r_position_tracking
                        - sensor.roborock_saros_10r_status
                        - sensor.roborock_saros_10r_current_room
                        - vacuum.matter_saros_10r
                        - sensor.matter_saros_10r_operational_state
                        - vacuum.roborock_saros_10r
                        - binary_sensor.roborock_saros_10r_cleaning
                        - sensor.saros_10r_current_position
                  timeout:
                    seconds: "{{ seconds | default(30) }}"
          - alias: either something has changed, or wait time has elapsed
            choose:
              - conditions:
                  - condition: numeric_state
                    entity_id: input_number.saros_10r_current_position_x
                    below: 28700
                sequence:
                  - action: script.turn_on
                    metadata: {}
                    data: {}
                    target:
                      entity_id:
                        - script.saros_10r_korytarz_przyziemie
              - conditions:
                  - alias: at least 30s has elapsed
                    condition: template
                    value_template: "{{ 30 + timestamp <= now() | as_timestamp }}"
                  - alias: >-
                      neither the door to kitchen, nor current floor, nor
                      position tracking, nor the vacuum state has changed
                    condition: template
                    value_template: >-
                      {{ is_state('select.roborock_saros_10r_selected_map',
                      floor) and
                      is_state('binary_sensor.zbeacon_ds01_drzwi_kuchnia_przyziemie',
                      kitchen) and
                      is_state('script.saros_10r_position_tracking', tracking)
                      and is_state('vacuum.matter_saros_10r', vacuum) }}
                  - condition: numeric_state
                    entity_id: input_number.saros_10r_current_position_y
                    above: 27500
                  - condition: numeric_state
                    entity_id: input_number.saros_10r_current_position_x
                    below: 29200
                sequence:
                  - action: vacuum.pause
                    metadata: {}
                    target:
                      entity_id: vacuum.matter_saros_10r
                    data: {}
                  - alias: wait for the vacuum to enter paused state
                    repeat:
                      until:
                        - condition: state
                          entity_id: vacuum.matter_saros_10r
                          state:
                            - paused
                      sequence:
                        - wait_for_trigger:
                            - trigger: state
                              entity_id:
                                - vacuum.matter_saros_10r
                                - sensor.matter_saros_10r_operational_state
                                - vacuum.roborock_saros_10r
                                - sensor.roborock_saros_10r_status
                                - binary_sensor.roborock_saros_10r_cleaning
                  - alias: >-
                      wait for someone to open the door, or to fix the door
                      sensor, or to request ignoring the door state
                    repeat:
                      until:
                        - condition: or
                          conditions:
                            - condition: state
                              entity_id: >-
                                binary_sensor.zbeacon_ds01_drzwi_kuchnia_przyziemie
                              state:
                                - "on"
                            - condition: state
                              entity_id: vacuum.matter_saros_10r
                              state:
                                - cleaning
                                - returning
                      sequence:
                        - wait_for_trigger:
                            - trigger: state
                              entity_id:
                                - >-
                                  binary_sensor.zbeacon_ds01_drzwi_kuchnia_przyziemie
                                - vacuum.matter_saros_10r
                                - sensor.matter_saros_10r_operational_state
                                - vacuum.roborock_saros_10r
                                - sensor.roborock_saros_10r_status
                                - binary_sensor.roborock_saros_10r_cleaning
                          timeout:
                            hours: 0
                            minutes: 1
                            seconds: 0
                            milliseconds: 0
                        - alias: If timed out then repeat the call for help
                          choose:
                            - conditions:
                                - condition: state
                                  entity_id: >-
                                    binary_sensor.zbeacon_ds01_drzwi_kuchnia_przyziemie
                                  state:
                                    - "off"
                                    - unknown
                                    - unavailable
                                - condition: state
                                  entity_id: vacuum.matter_saros_10r
                                  state:
                                    - paused
                                    - idle
                                    - error
                                    - unknown
                                    - unavailable
                              sequence:
                                - alias: Call for help with the door
                                  action: vacuum.locate
                                  metadata: {}
                                  data: {}
                                  target:
                                    entity_id: vacuum.roborock_saros_10r
                  - alias: >-
                      restart if the door to kuchnia is still closed, resume the
                      vacuum if still paused, or start ignoring the door to
                      kuchnia
                    choose:
                      - conditions:
                          - condition: state
                            entity_id: >-
                              binary_sensor.zbeacon_ds01_drzwi_kuchnia_przyziemie
                            state:
                              - "on"
                        sequence:
                          - choose:
                              - conditions:
                                  - condition: state
                                    entity_id: vacuum.matter_saros_10r
                                    state:
                                      - paused
                                      - idle
                                sequence:
                                  - action: vacuum.send_command
                                    metadata: {}
                                    data:
                                      command: app_resume
                                    target:
                                      entity_id: vacuum.roborock_saros_10r
                            alias: resume the vacuum if still sleeping
                          - action: script.turn_on
                            metadata: {}
                            data:
                              variables:
                                lock: "{{ lock }}"
                                washroom: "{{ washroom }}"
                            target:
                              entity_id:
                                - script.saros_10r_korytarz_przyziemie
                      - conditions:
                          - condition: state
                            entity_id: vacuum.matter_saros_10r
                            state:
                              - paused
                              - idle
                        sequence:
                          - action: script.turn_on
                            metadata: {}
                            data:
                              variables:
                                lock: "{{ lock }}"
                                paused: true
                                timestamp: "{{ timestamp }}"
                                washroom: "{{ washroom }}"
                            target:
                              entity_id:
                                - script.saros_10r_korytarz_przyziemie
                    default:
                      - action: script.turn_on
                        metadata: {}
                        data:
                          variables:
                            kitchen: ignore
                            lock: "{{ lock }}"
                            washroom: "{{ washroom }}"
                        target:
                          entity_id:
                            - script.saros_10r_korytarz_przyziemie
            default:
              - action: script.turn_on
                metadata: {}
                data:
                  variables:
                    lock: "{{ lock }}"
                    timestamp: "{{ timestamp }}"
                    washroom: "{{ washroom }}"
                target:
                  entity_id: script.saros_10r_korytarz_przyziemie
      - conditions:
          - alias: >-
              the vacuum is cleaning and may be trying to cross the door to
              śluza that is not open
            condition: template
            value_template: >-
              {{ (paused or vacuum == cleaning) and (y > 27500 and x > 31300 and
              x < 31800 and not lock in [ 'on', 'ignore', ]) }}
        sequence:
          - alias: >-
              unless something changes its state, wait up to 30s before pausing
              the vacuum
            repeat:
              until:
                - condition: or
                  conditions:
                    - alias: >-
                        either the door to śluza, or current floor, or position
                        tracking, or the vacuum state has changed
                      condition: template
                      value_template: >-
                        {{ not
                        is_state('select.roborock_saros_10r_selected_map',
                        floor) or not
                        is_state('binary_sensor.zbeacon_ds01_drzwi_sluza_przyziemie',
                        lock) or not
                        is_state('script.saros_10r_position_tracking', tracking)
                        or not is_state('vacuum.matter_saros_10r', vacuum) }}
                    - condition: numeric_state
                      entity_id: input_number.saros_10r_current_position_y
                      below: 27500
                    - condition: not
                      conditions:
                        - condition: numeric_state
                          entity_id: input_number.saros_10r_current_position_x
                          below: 31800
                          above: 31300
                      alias: the vacuum has left the door to śluza area
                    - alias: at least 30s has elapsed
                      condition: template
                      value_template: "{{ 30 + timestamp <= now() | as_timestamp }}"
              sequence:
                - variables:
                    seconds: "{{ 30 + timestamp - now() | as_timestamp }}"
                - wait_for_trigger:
                    - trigger: state
                      entity_id:
                        - binary_sensor.zbeacon_ds01_drzwi_sluza_przyziemie
                        - select.roborock_saros_10r_selected_map
                        - script.saros_10r_position_tracking
                        - sensor.roborock_saros_10r_current_room
                        - vacuum.matter_saros_10r
                        - sensor.matter_saros_10r_operational_state
                        - vacuum.roborock_saros_10r
                        - sensor.roborock_saros_10r_status
                        - binary_sensor.roborock_saros_10r_cleaning
                        - sensor.saros_10r_current_position
                  timeout:
